<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DGS Viewer</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        #progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            width: 0%;
            background: #667eea;
            z-index: 9;
            transition: width 0.15s ease;
        }
        #spinner {
            position: fixed;
            left: 12px;
            bottom: 10px;
            z-index: 9;
            color: #cfcfcf;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.45);
            padding: 4px 8px;
            border-radius: 8px;
        }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            color: #ff8080;
            font-size: 14px;
            text-shadow: 0 0 4px #000;
            pointer-events: none;
        }
        #fps, #camid, #quality {
            display: none;
        }
    </style>
</head>
<body>
    <div id="progress"></div>
    <div id="spinner">加载中...</div>
    <div id="message"></div>
    <div id="fps"></div>
    <div id="camid"></div>
    <div id="quality"></div>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            var canvas = document.getElementById('canvas');
            var isRightDragging = false;
            var lastX = 0;
            var lastY = 0;
            var relayingWheel = false;

            // 始终禁用右键菜单
            canvas.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            }, true);

            // 右键进入平移模式（拦截默认右键逻辑）
            canvas.addEventListener('mousedown', function(e) {
                if (e.button === 2) {
                    isRightDragging = true;
                    lastX = e.clientX;
                    lastY = e.clientY;
                    e.preventDefault();
                    e.stopImmediatePropagation();
                }
            }, true);

            window.addEventListener('mouseup', function(e) {
                if (e.button === 2) {
                    isRightDragging = false;
                }
            }, true);

            // 右键拖动 -> 转换为 shift+wheel（antimatter 内部映射为平移XY）
            canvas.addEventListener('mousemove', function(e) {
                if (!isRightDragging) return;

                var dx = e.clientX - lastX;
                var dy = e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;

                e.preventDefault();
                e.stopImmediatePropagation();

                relayingWheel = true;
                window.dispatchEvent(new WheelEvent('wheel', {
                    deltaX: -dx * 4,
                    deltaY: -dy * 4,
                    deltaMode: 0,
                    shiftKey: true,
                    bubbles: true,
                    cancelable: true
                }));
                relayingWheel = false;
            }, true);

            // 鼠标滚轮统一改为缩放（ctrl+wheel路径）
            window.addEventListener('wheel', function(e) {
                if (relayingWheel) return;

                e.preventDefault();
                e.stopImmediatePropagation();

                relayingWheel = true;
                window.dispatchEvent(new WheelEvent('wheel', {
                    deltaX: 0,
                    deltaY: e.deltaY,
                    deltaMode: e.deltaMode,
                    ctrlKey: true,
                    bubbles: true,
                    cancelable: true
                }));
                relayingWheel = false;
            }, { passive: false, capture: true });
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/gh/antimatter15/splat@main/main.js"></script>
</body>
</html>
